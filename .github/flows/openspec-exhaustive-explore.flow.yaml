sharedContext: |
  # OpenSpec Exhaustive Explore

  ## What This Does
  Iteratively calls the OpenSpec explore skill to deeply investigate a specification, codebase, or documentation set. It loops up to 5 times (or until convergence) to ensure all aspects are covered.

  ## When to Use
  - You want a complete, exhaustive understanding of an OpenSpec-managed specification
  - You need to surface hidden dependencies, edge cases, or undocumented assumptions
  - You are performing an audit or impact analysis and cannot afford oversights

  ## How It Works
  1. You provide a target (e.g., a component name or spec path)
  2. The Explorer uses the openspec-explore skill to produce an initial analysis
  3. The flow evaluates the results and, if gaps remain, automatically refines the exploration
  4. This repeats until no more insights can be gained (or the maximum 5 iterations are reached)

